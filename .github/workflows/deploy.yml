name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      # Restored after `npm ci`, which wipes node_modules before installing -
      # caching this beforehand would just get erased.
      - name: Cache Astro/Vite build cache
        uses: actions/cache@v5
        with:
          path: |
            .astro
            node_modules/.vite
          key: astro-build-cache-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            astro-build-cache-
      - name: Build
        run: npm run build
      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
