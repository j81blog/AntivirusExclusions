name: CI

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      # Restored after `npm ci`, which wipes node_modules before installing -
      # caching this beforehand would just get erased.
      - name: Cache Astro/Vite build cache
        uses: actions/cache@v5
        with:
          path: |
            .astro
            node_modules/.vite
          key: astro-build-cache-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            astro-build-cache-
      - name: Type-check
        run: npx astro check
      - name: Build
        run: npm run build
